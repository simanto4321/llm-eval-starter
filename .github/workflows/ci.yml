name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-evaluator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run LLM output comparison
        run: python llm_evaluator.py
      - name: Verify report
        run: test -f evaluation_report.md
